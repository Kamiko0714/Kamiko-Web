name: Deploy Kamiko Portfolio

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'dashboard-web/main-porto/package-lock.json'

      - name: 🏗️ Install & Build
        working-directory: ./dashboard-web/main-porto
        run: |
          npm ci
          npm run build

      - name: 📤 Upload Build Files (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          source: "dashboard-web/main-porto/dist/*"
          target: "~/Kamiko-Web/dist"
          strip_components: 3

      - name: 🚀 Finalize Deployment (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/Kamiko-Web/dist
            cd ~/Kamiko-Web
            sudo chown -R ${{ secrets.AZURE_VM_USER }}:${{ secrets.AZURE_VM_USER }} .
            chmod -R 755 dist
            if [ -f "deploy.sh" ]; then
              chmod +x deploy.sh
              ./deploy.sh
            fi