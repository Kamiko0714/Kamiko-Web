name: Deploy Kamiko Portfolio

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Install & Build
        run: |
          npm ci
          chmod +x node_modules/.bin/vite
          npm install
          npm run build

      - name: 📤 Upload Build Files (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "~/Kamiko-Web/"

      - name: 🚀 Finalize Deployment (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          script: |
            cd ~/Kamiko-Web
            sudo chown -R ${{ secrets.AZURE_VM_USER }}:${{ secrets.AZURE_VM_USER }} ~/Kamiko-Web/dist
            chmod -R 755 ~/Kamiko-Web/dist
            chmod +x deploy.sh
            ./deploy.sh